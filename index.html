<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom CC Caption Capture Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────── */
    .header {
      background: #1a1a2e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #333;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #2d8cff;
    }
    .status-bar {
      margin-left: auto;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #222;
      color: #888;
    }
    .status-bar.connected { background: #0a3d0a; color: #4caf50; }
    .status-bar.error { background: #3d0a0a; color: #f44336; }

    /* ─── Main Layout ────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Left Panel: Controls ───────────── */
    .left-panel {
      width: 340px;
      min-width: 340px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 10px;
    }

    /* ─── Form ───────────────────────────── */
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 10px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus {
      border-color: #2d8cff;
    }
    .form-row {
      display: flex;
      gap: 8px;
    }
    .form-row .form-group {
      flex: 1;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #2d8cff;
      color: white;
    }
    .btn-secondary {
      background: #333;
      color: #ccc;
      margin-top: 6px;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ─── Meeting Info ───────────────────── */
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .info-label { color: #666; }
    .info-value { color: #ccc; }

    /* ─── Participants ───────────────────── */
    .participant-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
    }
    .participant-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
    }
    .participant-name { color: #ccc; }
    .participant-host {
      font-size: 10px;
      color: #ff9800;
      margin-left: auto;
    }

    /* ─── Right Panel: Captions ──────────── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .captions-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      background: #1a1a1a;
    }
    .captions-header h2 {
      font-size: 14px;
      color: #ccc;
    }
    .caption-count {
      font-size: 11px;
      color: #666;
    }

    .captions-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .caption-item {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .caption-time {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      min-width: 70px;
    }
    .caption-speaker {
      font-size: 12px;
      color: #2d8cff;
      white-space: nowrap;
      min-width: 80px;
    }
    .caption-text {
      font-size: 13px;
      color: #ddd;
      line-height: 1.4;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      font-size: 14px;
    }

    /* ─── Zoom Meeting Container (hidden) ── */
    #zoom-meeting-container {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      z-index: -1;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────── -->
  <div class="header">
    <h1>Zoom CC Caption Capture</h1>
    <span class="status-bar" id="status">Ready</span>
  </div>

  <div class="main">

    <!-- ─── Left Panel ───────────────────── -->
    <div class="left-panel">

      <!-- Join Form -->
      <div class="section">
        <div class="section-title">Join Meeting</div>
        <form id="join-form">
          <div class="form-group">
            <label>SDK Key</label>
            <input type="text" id="sdk-key" placeholder="Your Meeting SDK App Key" required>
          </div>
          <div class="form-group">
            <label>SDK Secret</label>
            <input type="password" id="sdk-secret" placeholder="Your Meeting SDK App Secret" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Meeting Number</label>
              <input type="text" id="meeting-number" placeholder="123 456 7890" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="text" id="meeting-password" placeholder="Optional">
            </div>
          </div>
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="user-name" placeholder="CC Bot" value="CC Caption Bot">
          </div>
          <button type="submit" class="btn btn-primary" id="join-btn">Join Meeting</button>
          <button type="button" class="btn btn-secondary" id="export-btn" disabled>Export Captions (JSON)</button>
        </form>
      </div>

      <!-- Meeting Info -->
      <div class="section">
        <div class="section-title">Meeting Info</div>
        <div id="meeting-info">
          <div class="empty-state" style="height: auto; padding: 10px;">No active meeting</div>
        </div>
      </div>

      <!-- Participants -->
      <div class="section" style="flex: 1; overflow-y: auto;">
        <div class="section-title">Participants</div>
        <div id="participants"></div>
      </div>

    </div>

    <!-- ─── Right Panel: Captions ─────────── -->
    <div class="right-panel">
      <div class="captions-header">
        <h2>Live Captions</h2>
        <span class="caption-count" id="caption-count">0 captions</span>
      </div>
      <div class="captions-container" id="captions">
        <div class="empty-state">Waiting for captions...</div>
      </div>
    </div>

  </div>

  <!-- Zoom Meeting UI Container -->
  <div id="zoom-meeting-container"></div>

  <!-- .env config (load first, before SDK) -->
  <script src="/env-config.js"></script>

  <!-- ─── Zoom Meeting SDK (local npm, script tags) ──── -->
  <script src="/zoom-sdk/lib/vendor/react.min.js"></script>
  <script src="/zoom-sdk/lib/vendor/react-dom.min.js"></script>
  <script src="/zoom-sdk/lib/vendor/redux.min.js"></script>
  <script src="/zoom-sdk/lib/vendor/redux-thunk.min.js"></script>
  <script src="/zoom-sdk/lib/vendor/lodash.min.js"></script>
  <script src="/zoom-sdk/zoom-meeting-5.1.4.min.js"></script>

  <!-- App Logic -->
  <script src="./renderer.js"></script>

</body>
</html>
